<!doctype html>
<html lang="en-IN">
  <head>
    <!-- Basic setup -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Sanjib Das Portfolio | Graphic Designer & AI Ads Creator</title>
    <meta
      name="description"
      content="Sanjib Das is a graphic designer and AI ads creator from Kolkata, India. Explore AI UGC ads, product creatives, YouTube thumbnails, and social media designs."
    />
    <meta name="author" content="Sanjib Das" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <link rel="canonical" href="https://sanjibdas.vercel.app/" />

    <!-- Open Graph / Facebook / WhatsApp / LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Sanjib Das Portfolio" />
    <meta property="og:title" content="Sanjib Das Portfolio | AI Ads & Graphic Design" />
    <meta
      property="og:description"
      content="View Sanjib Das portfolio: AI UGC ads, product creatives, YouTube thumbnails, and social media designs for brands and creators."
    />
    <meta property="og:url" content="https://sanjibdas.vercel.app/" />
    <meta property="og:image" content="https://sanjibdas.vercel.app/sanjib-logo.png" />
    <meta property="og:image:alt" content="Sanjib Das Portfolio logo" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sanjib Das Portfolio | Graphic Designer & AI Ads Creator" />
    <meta
      name="twitter:description"
      content="Explore Sanjib Das portfolio featuring AI UGC ads, product creatives, YouTube thumbnails, and social media designs."
    />
    <meta name="twitter:image" content="https://sanjibdas.vercel.app/sanjib-logo.png" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Structured Data for Google -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Person",
            "@id": "https://sanjibdas.vercel.app/#person",
            "name": "Sanjib Das",
            "url": "https://sanjibdas.vercel.app/",
            "jobTitle": "Graphic Designer and AI Ads Creator",
            "description": "Sanjib Das is a graphic designer and AI ads creator from Kolkata, India. He creates AI UGC ads, product creatives, YouTube thumbnails, and social media designs.",
            "address": {
              "@type": "PostalAddress",
              "addressLocality": "Kolkata",
              "addressRegion": "West Bengal",
              "addressCountry": "India"
            },
            "sameAs": [
              "https://github.com/snjibz"
              /*
              TODO: Add other profiles later when available:
              "https://www.instagram.com/designs.sanjib",
              "https://www.linkedin.com/in/designes-sanjib"
              */
            ]
          },
          {
            "@type": "WebSite",
            "@id": "https://sanjibdas.vercel.app/#website",
            "name": "Sanjib Das Portfolio",
            "url": "https://sanjibdas.vercel.app/",
            "publisher": {
              "@id": "https://sanjibdas.vercel.app/#person"
            }
          },
          {
            "@type": "WebPage",
            "@id": "https://sanjibdas.vercel.app/#webpage",
            "name": "Sanjib Das Portfolio | Graphic Designer & AI Ads Creator",
            "url": "https://sanjibdas.vercel.app/",
            "description": "Sanjib Das portfolio featuring AI UGC ads, product creatives, YouTube thumbnails, and social media designs.",
            "isPartOf": {
              "@id": "https://sanjibdas.vercel.app/#website"
            },
            "about": {
              "@id": "https://sanjibdas.vercel.app/#person"
            }
          }
        ]
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
